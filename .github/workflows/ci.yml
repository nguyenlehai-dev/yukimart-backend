# ============================================================
# YukiMart Backend - CI Pipeline
# Runs on every push and PR to dev, staging, prod
# ============================================================
name: 🔍 CI - Test & Lint

on:
  push:
    branches: [dev, staging, prod]
  pull_request:
    branches: [dev, staging, prod]

jobs:
  test:
    name: 🧪 PHP Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: yukimart_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, xml, ctype, json, bcmath
          coverage: xdebug

      - name: 📥 Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: 🔧 Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:cache

      - name: 🗄️ Run migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: yukimart_test
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: 🧪 Run tests
        run: php artisan test --parallel
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: yukimart_test
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: 🔍 PHP CodeSniffer
        run: |
          composer require --dev squizlabs/php_codesniffer 2>/dev/null || true
          vendor/bin/phpcs --standard=PSR12 app/ --ignore=*/vendor/* 2>/dev/null || echo "⚠️ PSR12 check skipped"
        continue-on-error: true
