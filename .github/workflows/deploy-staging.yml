# ============================================================
# YukiMart Backend - Deploy to Staging
# ============================================================
name: Deploy to Staging

on:
  push:
    branches: [staging]

jobs:
  security-check:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - run: composer install --no-interaction --prefer-dist
      - run: composer audit 2>/dev/null || true

  deploy:
    name: Deploy to Staging Server
    runs-on: ubuntu-latest
    needs: [security-check]
    environment: staging
    steps:
      - name: Trigger deployment
        env:
          DEPLOY_WEBHOOK: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
        run: |
          curl -s -X POST "$DEPLOY_WEBHOOK" \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Secret: $DEPLOY_SECRET" \
            -d '{"repo":"yukimart-backend","branch":"staging","env":"staging","commit":"'"$GITHUB_SHA"'"}'

  verify:
    name: Verify Staging
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - run: sleep 20
      - run: curl -s -o /dev/null -w "API status: %{http_code}\n" "https://yukimart.io.vn/api" || true
        continue-on-error: true

  notify:
    name: Staging Report
    runs-on: ubuntu-latest
    needs: [security-check, deploy, verify]
    if: always()
    steps:
      - run: echo "Staging deploy - security=${{ needs.security-check.result }} deploy=${{ needs.deploy.result }} verify=${{ needs.verify.result }}"
