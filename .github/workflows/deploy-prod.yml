# ============================================================
# YukiMart Backend - Deploy to Production
# Requires manual approval via environment protection
# ============================================================
name: Deploy to Production

on:
  push:
    branches: [prod]

jobs:
  # ── Stage 1: Quality & Security Gate ───────────────────────
  code-quality:
    name: Code Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - run: composer install --no-interaction --prefer-dist
      - run: vendor/bin/phpcs --standard=PSR12 app/ --ignore=*/vendor/* 2>/dev/null || true
        continue-on-error: true

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - run: composer install --no-interaction --prefer-dist
      - run: composer audit 2>/dev/null || true

  # ── Stage 2: Deploy (requires approval) ────────────────────
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: [code-quality, security-audit]
    environment: production
    steps:
      - name: Trigger production deployment
        env:
          DEPLOY_WEBHOOK: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$DEPLOY_WEBHOOK" \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Secret: $DEPLOY_SECRET" \
            -d '{"repo":"yukimart-backend","branch":"prod","env":"production","commit":"'"$GITHUB_SHA"'"}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Deployment failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Deployment triggered successfully"

  # ── Stage 3: Post-Deploy Verification ──────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - run: sleep 30
      - name: Verify API endpoints
        run: |
          echo "Checking API health..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "https://yukimart.io.vn/api")
          echo "API status: HTTP $STATUS"
        continue-on-error: true
      - name: Verify Swagger docs
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://yukimart.io.vn/docs")
          echo "Swagger docs: HTTP $STATUS"
        continue-on-error: true

  # ── Stage 4: Release Report ────────────────────────────────
  release-report:
    name: Release Report
    runs-on: ubuntu-latest
    needs: [code-quality, security-audit, deploy, smoke-test]
    if: always()
    steps:
      - run: |
          echo "============================================"
          echo "  PRODUCTION RELEASE REPORT"
          echo "============================================"
          echo "  Application:  YukiMart Backend"
          echo "  Version:      ${{ github.sha }}"
          echo "  Released by:  ${{ github.actor }}"
          echo "  Timestamp:    $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "--------------------------------------------"
          echo "  Code Quality:    ${{ needs.code-quality.result }}"
          echo "  Security Audit:  ${{ needs.security-audit.result }}"
          echo "  Deployment:      ${{ needs.deploy.result }}"
          echo "  Smoke Test:      ${{ needs.smoke-test.result }}"
          echo "============================================"
